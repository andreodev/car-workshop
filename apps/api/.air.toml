root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/admin-api ./cmd/api"
bin = "./tmp/admin-api"
delay = 1000
exclude_dir = ["tmp", "vendor"]
include_ext = ["go"]
kill_delay = "500ms"
log = "tmp/air-build.log"
send_interrupt = true
stop_on_error = true

[log]
time = true

[misc]
clean_on_exit = true
