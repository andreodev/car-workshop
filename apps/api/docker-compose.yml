services:
  admin-api:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "${DATABASE_URL}"
      ADMIN_JWT_SECRET: "${ADMIN_JWT_SECRET}"
      ADMIN_CORS_ORIGINS: "${ADMIN_CORS_ORIGINS}"
      CUSTOM_DOMAIN_CNAME_TARGET: "${CUSTOM_DOMAIN_CNAME_TARGET:-cname.vercel-dns.com}"
      VERCEL_TOKEN: "${VERCEL_TOKEN:-}"
      VERCEL_PROJECT_ID: "${VERCEL_PROJECT_ID:-}"
    networks:
      - car-workshop
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

networks:
  car-workshop:
    external: true
    name: car-workshop_default