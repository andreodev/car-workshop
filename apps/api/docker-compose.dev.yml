services:
  admin-api:
    image: golang:1.26-alpine
    working_dir: /src
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/car_workshop"
      ADMIN_JWT_SECRET: "dev-admin-secret"
      ADMIN_CORS_ORIGINS: "http://localhost:3002,http://127.0.0.1:3002,http://localhost:3003,http://127.0.0.1:3003"
      CUSTOM_DOMAIN_CNAME_TARGET: "cname.vercel-dns.com"
      VERCEL_TOKEN: "${VERCEL_TOKEN:-}"
      VERCEL_PROJECT_ID: "${VERCEL_PROJECT_ID:-}"
    volumes:
      - .:/src
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: >
      sh -c "apk add --no-cache git &&
      go install github.com/air-verse/air@latest &&
      air -c .air.toml"
    networks:
      - car-workshop

volumes:
  go-mod-cache:
  go-build-cache:

networks:
  car-workshop:
    external: true
    name: car-workshop_default
